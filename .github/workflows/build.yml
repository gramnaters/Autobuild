name: JioHotstar AutoBuild

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'apk_url.txt'
      - 'cookies/**'
      - 'patches/**'
      - 'scripts/**'

env:
  PACKAGE_NAME: in.startv.hotstar
  ARCH: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install apktool
        run: |
          APKTOOL_URL=$(curl -sL "https://api.github.com/repos/iBotPeaches/Apktool/releases/latest" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['assets'][0]['browser_download_url'])")
          curl -sL "$APKTOOL_URL" -o /usr/local/bin/apktool.jar
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'exec java -jar /usr/local/bin/apktool.jar "$@"' >> /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Validate cookie files
        run: |
          REQUIRED=(sessionUserUP.txt userHID.txt userPID.txt deviceId.txt)
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "cookies/$f" ]; then
              echo "::error::Missing cookie file: $f"
              exit 1
            fi
            echo "  $f: $(wc -c < cookies/$f) bytes"
          done

      - name: Download APK (from apk_url.txt)
        run: python3 scripts/download_apk.py

      - name: Decompile APK
        id: decompile
        run: |
          apktool d jiohotstar.apk -o decompiled -f 2>&1
          if [ ! -f decompiled/AndroidManifest.xml ]; then
            echo "::error::Decompile failed — AndroidManifest.xml not found"
            echo "::notice::The downloaded file may be an XAPK/bundle, not a standalone APK."
            echo "::notice::Check that apk_url.txt points to a direct .apk file (not .xapk or .apks)"
            exit 1
          fi
          VCODE=$(grep -oP '^\s*versionCode:\s*\K[0-9]+' decompiled/apktool.yml 2>/dev/null | head -1) || true
          VNAME=$(grep -oP "^\s*versionName:\s*\K[^'\"\n]+" decompiled/apktool.yml 2>/dev/null | tr -d "'\"" | head -1) || true
          echo "version_code=${VCODE:-unknown}" >> $GITHUB_OUTPUT
          echo "version_name=${VNAME:-unknown}" >> $GITHUB_OUTPUT

      - name: Remove split APK flags & fix resources
        run: |
          MANIFEST="decompiled/AndroidManifest.xml"
          sed -i 's/ android:isSplitRequired="[^"]*"//g' "$MANIFEST"
          sed -i 's/ android:requiredSplitTypes="[^"]*"//g' "$MANIFEST"
          sed -i 's/ android:splitTypes="[^"]*"//g' "$MANIFEST"
          sed -i '/com.android.vending.splits.required/d' "$MANIFEST"
          sed -i '/android:name="com.android.vending.splits"/d' "$MANIFEST"
          sed -i 's/android:extractNativeLibs="false"/android:extractNativeLibs="true"/g' "$MANIFEST"
          sed -i 's/android:intentMatchingFlags="[^"]*" //g' "$MANIFEST"
          find decompiled/res/drawable* -name "*.xml" -exec \
            sed -i 's/android:drawable="@null"/android:drawable="@android:color\/transparent"/g' {} \; 2>/dev/null || true

      - name: Inject smali patches
        run: |
          SMALI_DIR=""
          SMALLEST=999999
          for dir in decompiled/smali*/; do
            COUNT=$(find "$dir" -name "*.smali" -type f 2>/dev/null | wc -l)
            if [ "$COUNT" -lt "$SMALLEST" ]; then SMALLEST=$COUNT; SMALI_DIR="$dir"; fi
          done
          [ -z "$SMALI_DIR" ] && SMALI_DIR="decompiled/smali/"
          TARGET="$SMALI_DIR/com/hotstar/patch"
          mkdir -p "$TARGET"
          cp patches/CookieFileReader.smali "$TARGET/"
          cp patches/cookie-seeder.smali "$TARGET/CookieSeeder.smali"
          mkdir -p decompiled/assets/cookies
          for f in cookies/*.txt; do [ -f "$f" ] && cp "$f" "decompiled/assets/cookies/$(basename "$f")"; done

      - name: Patch Application class
        run: |
          MANIFEST="decompiled/AndroidManifest.xml"
          APP_CLASS=$(grep -oP '<application[^>]*android:name="\K[^"]+' "$MANIFEST")
          SMALI_PATH="${APP_CLASS//./\/}.smali"
          FULL_PATH=""
          for dir in decompiled/smali*/; do
            if [ -f "${dir}${SMALI_PATH}" ]; then FULL_PATH="${dir}${SMALI_PATH}"; break; fi
          done
          if [ -z "$FULL_PATH" ]; then
            CLASS_NAME=$(echo "$APP_CLASS" | sed 's/.*\.//')
            FULL_PATH=$(find decompiled -path "*/smali*" -name "${CLASS_NAME}.smali" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$FULL_PATH" ]; then echo "::error::Application class not found"; exit 1; fi
          if grep -q "CookieSeeder" "$FULL_PATH"; then exit 0; fi
          INJECT='    invoke-static {p0}, Lcom/hotstar/patch/CookieSeeder;->seedIfNeeded(Landroid/content/Context;)V'
          LINE_NUM=$(grep -n "invoke-super" "$FULL_PATH" | head -1 | cut -d: -f1)
          sed -i "${LINE_NUM}a\\${INJECT}" "$FULL_PATH"

      - name: Patch IdentityRepository
        run: |
          ID_REPO=""
          for dir in decompiled/smali*/; do
            if [ -f "${dir}Ff/d.smali" ]; then ID_REPO="${dir}Ff/d.smali"; break; fi
          done
          if [ -z "$ID_REPO" ]; then echo "::warning::IdentityRepository not found - skipping"; exit 0; fi
          if grep -q "CookieSeeder.*getInjectedUserToken" "$ID_REPO"; then exit 0; fi
          awk '
          function bump_locals(line) {
              if (line ~ /\.locals [0-9]+$/) { split(line, a, " "); if (a[2] + 0 < 2) { sub(/\.locals [0-9]+$/, ".locals 2", line) } }
              if (line ~ /\.registers [0-9]+$/) { split(line, a, " "); if (a[2] + 0 < 4) { sub(/\.registers [0-9]+$/, ".registers 4", line) } }
              return line
          }
          BEGIN { in_c = 0; in_i = 0; in_ann = 0; first_inst = 0; }
          /\.method public final c\(Ltt\/d;\)Ljava\/lang\/Object;/ { in_c = 1; in_i = 0; in_ann = 0; first_inst = 0; print; next }
          in_c == 1 {
            if (/\.locals [0-9]+$/ || /\.registers [0-9]+$/) { $0 = bump_locals($0); print; next }
            if (/\.annotation build/) { in_ann = 1 }
            if (/\.end annotation/) { in_ann = 0 }
            if (/^\s*\.line [0-9]+\s*$/ && first_inst == 0 && !in_ann) { next }
            if (/iget-object v0, p0, LFf\/d;->a:Ljava\/lang\/String;/ && first_inst == 0) {
              first_inst = 1; print ""; print "    # PATCH: inject user token when field a is null"
              print "    iget-object v0, p0, LFf/d;->a:Ljava/lang/String;"; print "    if-nez v0, :patch_orig_c"; print ""
              print "    invoke-static {}, Lcom/hotstar/patch/CookieSeeder;->getInjectedUserToken()Ljava/lang/String;"
              print "    move-result-object v1"; print "    if-eqz v1, :patch_orig_c"; print ""
              print "    iput-object v1, p0, LFf/d;->a:Ljava/lang/String;"; print "    return-object v1"; print ""
              print "    :patch_orig_c"; print ""; next
            }
            if (/^\.end method/) { in_c = 0 }; print; next
          }
          /\.method public final i\(Lye\/J;\)Ljava\/lang\/Object;/ { in_i = 1; in_c = 0; in_ann = 0; first_inst = 0; print; next }
          in_i == 1 {
            if (/\.locals [0-9]+$/ || /\.registers [0-9]+$/) { $0 = bump_locals($0); print; next }
            if (/\.annotation build/) { in_ann = 1 }
            if (/\.end annotation/) { in_ann = 0 }
            if (/^\s*\.line [0-9]+\s*$/ && first_inst == 0 && !in_ann) { next }
            if (/iget-object v0, p0, LFf\/d;->g:Ljava\/lang\/String;/ && first_inst == 0) {
              first_inst = 1; print ""; print "    # PATCH: inject media token when field g is null"
              print "    iget-object v0, p0, LFf/d;->g:Ljava/lang/String;"; print "    if-nez v0, :patch_orig_i"; print ""
              print "    invoke-static {}, Lcom/hotstar/patch/CookieSeeder;->getInjectedMediaToken()Ljava/lang/String;"
              print "    move-result-object v1"; print "    if-eqz v1, :patch_orig_i"; print ""
              print "    iput-object v1, p0, LFf/d;->g:Ljava/lang/String;"; print "    return-object v1"; print ""
              print "    :patch_orig_i"; print ""; next
            }
            if (/^\.end method/) { in_i = 0 }; print; next
          }
          { print }
          ' "$ID_REPO" > patched_d.smali
          [ ! -s patched_d.smali ] && { echo "::error::Patching produced empty file"; exit 1; }
          mv patched_d.smali "$ID_REPO"

      - name: Recompile APK
        run: |
          set +e
          apktool b decompiled -o jiohotstar_unsigned.apk 2>&1 | tail -10
          set -e
          if [ ! -f jiohotstar_unsigned.apk ]; then
            echo "::error::Recompile failed — jiohotstar_unsigned.apk not found"
            exit 1
          fi
          echo "✅ Recompiled: $(ls -la jiohotstar_unsigned.apk | awk '{print $5}') bytes"

      - name: Check native libs
        id: native_check
        run: |
          LIB_COUNT=$(unzip -l jiohotstar_unsigned.apk 2>/dev/null | grep -c "lib/.*\.so" || true)
          echo "lib_count=$LIB_COUNT" >> $GITHUB_OUTPUT

      - name: Inject native libs (if missing)
        if: steps.native_check.outputs.lib_count == '0'
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          if [ -f arm64_split.apk ] && [ "$(stat -c%s arm64_split.apk 2>/dev/null || echo 0)" -gt 1000000 ]; then
            mkdir -p lib_tmp && unzip -o arm64_split.apk "lib/*" -d lib_tmp 2>/dev/null || true
            cp jiohotstar_unsigned.apk jiohotstar_mod.apk
            zip -d jiohotstar_mod.apk "META-INF/*" 2>/dev/null || true
            (cd lib_tmp && zip -r ../jiohotstar_mod.apk lib/ 2>/dev/null)
            rm -rf lib_tmp
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
            export PATH="${BUILD_TOOLS}:${PATH}"
            zipalign -f 4 jiohotstar_mod.apk jiohotstar_aligned.apk
            keytool -genkeypair -v -keystore sign.keystore -alias hotstar -keyalg RSA -keysize 2048 -validity 10000 -storepass hotstarpatch -keypass hotstarpatch -dname "CN=Patcher, OU=Patch, O=HP, L=X, ST=X, C=XX" 2>/dev/null
            apksigner sign --ks sign.keystore --ks-pass pass:hotstarpatch --ks-key-alias hotstar --key-pass pass:hotstarpatch --out jiohotstar_patched.apk jiohotstar_aligned.apk 2>/dev/null
            rm -f jiohotstar_mod.apk jiohotstar_aligned.apk
          else
            cp jiohotstar_unsigned.apk jiohotstar_patched.apk
          fi

      - name: Sign APK (when libs present)
        if: steps.native_check.outputs.lib_count != '0'
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          export PATH="${BUILD_TOOLS}:${PATH}"
          keytool -genkeypair -v -keystore sign.keystore -alias hotstar -keyalg RSA -keysize 2048 -validity 10000 -storepass hotstarpatch -keypass hotstarpatch -dname "CN=Patcher, OU=Patch, O=HP, L=X, ST=X, C=XX" 2>/dev/null
          zipalign -f 4 jiohotstar_unsigned.apk jiohotstar_aligned.apk
          apksigner sign --ks sign.keystore --ks-pass pass:hotstarpatch --ks-key-alias hotstar --key-pass pass:hotstarpatch --out jiohotstar_patched.apk jiohotstar_aligned.apk 2>/dev/null
          rm -f jiohotstar_aligned.apk

      - name: Rename & Release
        run: |
          VNAME="${{ steps.decompile.outputs.version_name }}"
          DATE=$(date +'%Y%m%d')
          FINAL_NAME="JioHotstar-Premium-v${VNAME}-${DATE}-arm64.apk"
          cp jiohotstar_patched.apk "$FINAL_NAME"
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JioHotstar Premium ${{ steps.decompile.outputs.version_name != 'unknown' && format('v{0}', steps.decompile.outputs.version_name) || 'Latest Build' }}"
          body: |
            Automated build from GitHub Actions

            **Version**: `${{ steps.decompile.outputs.version_name }}`
            **Architecture**: arm64-v8a

            ### Features
            - Premium account auto-login via cookie injection
            - No root required
            - Ad-free experience (with premium cookies)

            ### How to use
            1. Uninstall any existing JioHotstar
            2. Download and install this APK
            3. Launch - you will be logged in automatically

            ---
            *Built by [JioHotstar AutoBuild](https://github.com/${{ github.repository }})*
          files: JioHotstar-Premium-*.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
